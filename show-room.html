<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebastián Colombo | Show Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style id="dinamic-styles">
        :root {
            --color-uno: #2d3436;
            --color-dos: #636e72;
            --color-tres: #b2bec3;
        }
    </style>

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; min-height: 100vh; 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--color-uno), var(--color-dos), var(--color-tres));
            background-size: 400% 400%;
            animation: gradientAnim 15s ease infinite;
            color: white;
            display: flex; justify-content: center; align-items: center;
        }

        @keyframes gradientAnim { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }

        .container {
            max-width: 800px; padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        h1 { font-size: 3.5rem; margin: 0 0 10px 0; font-weight: 600; letter-spacing: -2px; }
        p { font-size: 1.2rem; line-height: 1.6; opacity: 0.9; margin-bottom: 30px; font-weight: 300; }
        
        .button-group { display: flex; gap: 15px; justify-content: center; }
        
        .btn {
            text-decoration: none; padding: 15px 30px; border-radius: 12px;
            font-weight: 600; transition: all 0.3s ease; border: 2px solid white;
        }

        .primary { background: white; color: black; }
        .secondary { background: transparent; color: white; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="edit-nombre-oficina">Oficina Prototipo</h1>
        <p id="edit-descripcion-breve">
            Este es el showroom virtual de Sebastián Colombo. Un espacio minimalista para probar la gestión de contenidos.
        </p>

        <div class="button-group">
            <a href="index.html" id="edit-boton-principal" class="btn primary">Volver al Inicio</a>
            <a href="https://linkedin.com" id="edit-boton-secundario" class="btn secondary">Mi Perfil</a>
        </div>
    </div>

</body>
</html>
