<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Web | Inicio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #ffffff;
            --button-bg: #ffffff;
            --button-text: #333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Degradado animado con tonos celestes y blancos */
            background: linear-gradient(-45deg, #74b9ff, #ffffff, #81ecec, #74b9ff);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            overflow: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .content {
            text-align: center;
            animation: fadeIn 1.5s ease-out;
            padding: 20px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 600;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
            color: #2d3436; /* Un gris oscuro para que resalte sobre el blanco/celeste */
        }

        p {
            font-size: 1.2rem;
            font-weight: 300;
            color: #636e72;
            margin-bottom: 2rem;
        }

        .cta-button {
            text-decoration: none;
            background-color: #2d3436; /* Botón oscuro para contraste fuerte */
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            background-color: #000;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Lienzo Libre.</h1>
        <p>Tu propio espacio, sin límites de diseño.</p>
        <a href="#" class="cta-button">Ver más</a>
    </div>

</body>
</html>
