<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Web | Inicio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-color: #ffffff;
        }

        /* El truco del centrado total está aquí */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            /* min-height asegura que ocupe toda la pantalla real, restando barras del navegador */
            min-height: 100dvh; 
            display: flex;
            justify-content: center; /* Centrado horizontal */
            align-items: center;     /* Centrado vertical */
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: linear-gradient(-45deg, #74b9ff, #ffffff, #81ecec, #74b9ff);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .content {
            text-align: center;
            animation: fadeIn 1.5s ease-out;
            padding: 20px;
            width: 100%; /* Asegura que el texto no se pegue a los bordes en móviles */
            max-width: 600px;
        }

        h1 {
            /* clamp hace que la fuente sea gigante en PC y se achique sola en móvil */
            font-size: clamp(3rem, 15vw, 6rem); 
            font-weight: 600;
            letter-spacing: -3px;
            margin: 0 0 2rem 0;
            color: #2d3436;
        }

        .cta-button {
            text-decoration: none;
            background-color: #2d3436;
            color: white;
            padding: 18px 45px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            background-color: #000;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Hola.</h1>
        <a href="#" class="cta-button">Ver más</a>
    </div>

</body>
</html>
