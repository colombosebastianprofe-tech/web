<!DOCTYPE html>
<html lang="es"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio | Versión Limpia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&amp;display=swap" rel="stylesheet">
    
    <style id="dinamic-styles">:root { --color-uno: #479ef5; --color-dos: #fc42ff; --color-tres: #71f988; }</style>

    <style>
        /* Solo estilos visuales, ¡nada de paneles de administración! */
        body, html { 
            margin: 0; padding: 0; width: 100%; min-height: 100dvh; 
            display: flex; justify-content: center; align-items: center; 
            font-family: 'Inter', sans-serif; overflow: hidden;
            background: linear-gradient(-45deg, var(--color-uno), var(--color-dos), var(--color-tres), var(--color-uno));
            background-size: 400% 400%;
            animation: gradientAnim 15s ease infinite;
        }
        @keyframes gradientAnim { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }
        
        .content { text-align: center; max-width: 600px; padding: 20px; animation: fadeIn 1.5s ease-out; }
        h1 { font-size: clamp(3rem, 15vw, 6rem); color: #2d3436; margin: 0 0 2rem 0; font-weight: 600; letter-spacing: -3px; }
        .cta-button { 
            text-decoration: none; background: #2d3436; color: white; 
            padding: 20px 50px; border-radius: 60px; display: inline-block; 
            font-weight: 600; font-size: 1.1rem; transition: 0.3s;
        }
        .cta-button:hover { transform: scale(1.05); background: #000; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="content">
        <h1 id="edit-titulo-principal">Hola.</h1>
        <a href="menu" id="edit-texto-boton" class="cta-button">Continuar</a>
    </div>

    

</body></html>
