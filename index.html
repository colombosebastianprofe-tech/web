<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lienzo en Blanco</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        /* Variables para cambiar colores fácilmente */
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #0070f3; /* Azul eléctrico estilo moderno */
        }

        /* Modo oscuro automático si el usuario lo prefiere en su sistema */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0a0a0a;
                --text-color: #ededed;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Sin scrollbars */
        }

        .content {
            text-align: center;
            max-width: 600px;
            padding: 20px;
            /* Animación de entrada suave */
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4rem); /* Tamaño fluido */
            font-weight: 600;
            letter-spacing: -2px;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            opacity: 0.8;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .cta-button {
            text-decoration: none;
            color: var(--bg-color);
            background-color: var(--text-color);
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
            display: inline-block;
        }

        .cta-button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Lienzo Libre.</h1>
        <p>Este sitio no tiene encabezados, pies de página ni límites. Solo código puro corriendo en GitHub Pages.</p>
        <a href="#" class="cta-button">Explorar más</a>
    </div>

</body>
</html>
