<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Lienzo en Blanco</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
    :root {
        --text-color: #ffffff;
    }

    body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
        color: var(--text-color);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        /* Fondo degradado animado */
        background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
        overflow: hidden;
    }

    @keyframes gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .content { text-align: center; animation: fadeIn 2s ease; }
    h1 { font-size: 4rem; letter-spacing: -2px; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

    <div class="content">
        <h1>Lienzo Libre.</h1>
        <p>Este sitio no tiene encabezados, pies de página ni límites. Solo código puro corriendo en GitHub Pages.</p>
        <a href="#" class="cta-button">Explorar más</a>
    </div>

</body>
</html>
