<html lang="es"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Auto-Editable</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&amp;display=swap" rel="stylesheet">
    <style>
        /* [Tus estilos anteriores se mantienen igual] */
        #admin-panel { position: fixed; top: 0; left: 0; width: 320px; height: 100dvh; background: white; z-index: 1000; padding: 20px; display: none; box-shadow: 5px 0 15px rgba(0,0,0,0.2); font-family: sans-serif; }
        .field-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #2ecc71; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #27ae60; }
        
        /* Estilos base de tu web */
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100dvh; display: flex; justify-content: center; align-items: center; font-family: 'Inter', sans-serif; background: linear-gradient(-45deg, #74b9ff, #ffffff, #81ecec, #74b9ff); background-size: 400% 400%; animation: gradient 10s ease infinite; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .content { text-align: center; max-width: 600px; }
        h1 { font-size: clamp(3rem, 15vw, 6rem); color: #2d3436; margin: 0 0 2rem 0; }
        .cta-button { text-decoration: none; background: #2d3436; color: white; padding: 18px 45px; border-radius: 50px; display: inline-block; }
    </style>
</head>
<body>

    <div id="admin-panel" style="display: block;">
        <h3>🛠 Editor en Vivo</h3>
        <div class="field-group">
            <label>Token de GitHub:</label>
            <input type="password" id="gh-token" placeholder="Pega tu github_pat aquí">
        </div>
        <hr>
        <div class="field-group">
            <label>Título:</label>
            <input type="text" id="input-h1" oninput="actualizarVista()">
        </div>
        <div class="field-group">
            <label>Botón:</label>
            <input type="text" id="input-btn" oninput="actualizarVista()">
        </div>
        <button onclick="publicarEnGitHub()">🚀 PUBLICAR EN GITHUB</button>
        <p id="status" style="font-size: 12px; color: blue;">Conectando con GitHub...</p>
    </div>

    <div class="content">
        <h1 id="view-h1">Hola</h1>
        <a href="#" id="view-btn" class="cta-button">Comenzar</a>
    </div>

    <script>
        // CONFIGURACIÓN (Rellena esto con tus datos)
        const CONFIG = {
            usuario: 'colombosebastianprofe-tech',
            repo: 'web',
            archivo: 'index.html' // El nombre de este mismo archivo
        };

        function actualizarVista() {
            document.getElementById('view-h1').innerText = document.getElementById('input-h1').value || "Hola.";
            document.getElementById('view-btn').innerText = document.getElementById('input-btn').value || "Ver más";
        }

        async function publicarEnGitHub() {
            const token = document.getElementById('gh-token').value;
            const status = document.getElementById('status');
            if(!token) return alert("Copia tu Token de GitHub primero");

            status.innerText = "Conectando con GitHub...";

            try {
                // 1. Obtener el archivo actual para tener el "sha" (la huella digital)
                const res = await fetch(`https://api.github.com/repos/${CONFIG.usuario}/${CONFIG.repo}/contents/${CONFIG.archivo}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const data = await res.json();
                const sha = data.sha;

                // 2. Preparar el nuevo código (clonamos el HTML actual)
                // Para simplificar, enviamos todo el documento actual
                const nuevoContenido = document.documentElement.outerHTML;

                // 3. Enviar a GitHub
                const update = await fetch(`https://api.github.com/repos/${CONFIG.usuario}/${CONFIG.repo}/contents/${CONFIG.archivo}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Actualización desde formulario web",
                        content: btoa(unescape(encodeURIComponent(nuevoContenido))), // Convertir a Base64
                        sha: sha
                    })
                });

                if(update.ok) {
                    status.innerText = "✅ ¡Publicado! En 1 min se verá el cambio.";
                } else {
                    status.innerText = "❌ Error al publicar.";
                }
            } catch (e) {
                status.innerText = "❌ Error de conexión.";
            }
        }

        // Tecla 'E' para mostrar panel
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'e' && e.target.tagName !== 'INPUT') {
                const p = document.getElementById('admin-panel');
                p.style.display = (p.style.display === 'block') ? 'none' : 'block';
            }
        });
    </script>


</body></html>
