<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPanel Central | Gestor de Oficinas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0984e3; --bg: #f5f6fa; --text: #2f3640; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 95%; max-width: 550px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin: 40px 0; box-sizing: border-box; }
        h1 { font-size: 22px; margin: 0 0 20px 0; text-align: center; color: var(--primary); }
        .setup-group { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; color: #7f8c8d; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #dcdde1; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-load { background: var(--primary); color: white; }
        .btn-save { background: #27ae60; color: white; margin-top: 20px; display: none; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        #editor-fields { margin-top: 20px; display: none; }
        .editor-card { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .status { text-align: center; font-size: 13px; margin-top: 15px; font-weight: 600; min-height: 20px; }
        .url-input { background: #fffbe6; border-color: #ffe58f; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛠 CPanel Central</h1>

    <div class="setup-group">
        <label>🔑 Credenciales GitHub</label>
        <input type="password" id="token" placeholder="github_pat_...">
        <label>📄 Archivo de la Oficina</label>
        <input type="text" id="filename" placeholder="Ej: showroom.html">
        <button class="btn-load" onclick="cargarPagina()">🔍 ESCANEAR PÁGINA</button>
    </div>

    <div id="editor-fields">
        <div id="dynamic-inputs"></div>
        <button id="btn-save" class="btn-save" onclick="guardarCambios()">🚀 PUBLICAR EN GITHUB</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script>
    const CONFIG = {
        usuario: 'colombosebastianprofe-tech',
        repo: 'web'
    };

    let originalHTML = "";
    let fileSHA = "";

    window.onload = () => {
        const saved = localStorage.getItem('gh_token_central');
        if(saved) document.getElementById('token').value = saved;
    };

    async function cargarPagina() {
        const file = document.getElementById('filename').value.trim();
        const token = document.getElementById('token').value.trim();
        const status = document.getElementById('status');
        
        if(!file || !token) return alert("Por favor, completa el Token y el nombre del archivo.");
        localStorage.setItem('gh_token_central', token);

        status.innerText = "⏳ Accediendo a la oficina...";
        status.style.color = "#2f3640";
        
        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.usuario}/${CONFIG.repo}/contents/${file}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if(!res.ok) throw new Error("No se encontró el archivo.");
            const data = await res.json();
            fileSHA = data.sha;
            originalHTML = decodeURIComponent(escape(atob(data.content)));

            analizarYCrearFormulario(originalHTML);
            
            status.innerText = "✅ Escaneo completo. Listo para editar.";
            status.style.color = "#27ae60";
        } catch (e) {
            status.innerText = "❌ Error: " + e.message;
            status.style.color = "#e74c3c";
        }
    }

    function analizarYCrearFormulario(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        const container = document.getElementById('dynamic-inputs');
        container.innerHTML = "";

        // 1. ESCÁNER DE COLORES
        const styleTag = doc.getElementById('dinamic-styles');
        if(styleTag) {
            const colorSection = document.createElement('div');
            colorSection.innerHTML = "<label style='color: #0984e3; margin-bottom: 10px;'>🎨 Paleta de la Oficina</label>";
            const colores = styleTag.innerHTML.match(/#[0-9a-fA-F]{3,6}/g);
            
            if(colores) {
                const row = document.createElement('div');
                row.style.display = "flex"; row.style.gap = "10px"; row.style.marginBottom = "20px";
                colores.forEach((c) => {
                    const wrap = document.createElement('div'); wrap.style.flex = "1";
                    wrap.innerHTML = `<input type="color" class="color-input" value="${c}" style="height: 45px;">`;
                    row.appendChild(wrap);
                });
                container.appendChild(colorSection);
                container.appendChild(row);
            }
        }

        // 2. ESCÁNER DE CONTENIDOS (IDs con edit-)
        const editables = doc.querySelectorAll('[id^="edit-"]');
        if(editables.length > 0) {
            const labelMsg = document.createElement('label');
            labelMsg.innerText = "📝 Elementos Editables";
            labelMsg.style.color = "#0984e3";
            container.appendChild(labelMsg);

            editables.forEach(el => {
                const name = el.id.replace('edit-', '').replace(/-/g, ' ');
                const div = document.createElement('div');
                div.className = 'editor-card';
                
                let content = `<label>Texto: ${name}</label>
                               <input type="text" class="input-text" data-id="${el.id}" value="${el.innerText.trim()}">`;
                
                if(el.tagName === 'A') {
                    content += `<label style="font-size: 9px; margin-top: 5px;">🔗 Dirección del Botón (Link)</label>
                                <input type="text" class="input-link url-input" data-id="${el.id}" value="${el.getAttribute('href')}">`;
                }
                
                div.innerHTML = content;
                container.appendChild(div);
            });
        }

        document.getElementById('editor-fields').style.display = 'block';
        document.getElementById('btn-save').style.display = 'block';
    }

    async function guardarCambios() {
        const file = document.getElementById('filename').value.trim();
        const token = document.getElementById('token').value.trim();
        const status = document.getElementById('status');
        
        status.innerText = "🚀 Guardando en la oficina virtual...";

        const parser = new DOMParser();
        const doc = parser.parseFromString(originalHTML, "text/html");

        document.querySelectorAll('.input-text').forEach(input => {
            const el = doc.getElementById(input.getAttribute('data-id'));
            if(el) el.innerText = input.value;
        });

        document.querySelectorAll('.input-link').forEach(input => {
            const el = doc.getElementById(input.getAttribute('data-id'));
            if(el) el.setAttribute('href', input.value);
        });

        const colors = document.querySelectorAll('.color-input');
        const styleTag = doc.getElementById('dinamic-styles');
        if(styleTag && colors.length >= 3) {
            styleTag.innerHTML = `:root { --color-uno: ${colors[0].value}; --color-dos: ${colors[1].value}; --color-tres: ${colors[2].value}; }`;
        }

        const finalHTML = "<" + "!DOCTYPE html>\n" + doc.documentElement.outerHTML;

        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.usuario}/${CONFIG.repo}/contents/${file}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `CPanel Update: ${file}`,
                    content: btoa(unescape(encodeURIComponent(finalHTML))),
                    sha: fileSHA
                })
            });

            if(res.ok) {
                status.innerText = "✨ ¡Oficina actualizada con éxito!";
                const data = await res.json();
                fileSHA = data.content.sha;
            } else { throw new Error(); }
        } catch (e) {
            status.innerText = "❌ Error al sincronizar.";
        }
    }
</script>
</body>
</html>
